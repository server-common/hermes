# 캐시 워밍업 설정
hermes:
  cache:
    warmup:
      enabled: true
      delay-seconds: 2  # 애플리케이션 시작 후 워밍업 지연 시간
      frequent-settings:
        - daily_limit
        - max_retry_count
        - retry_delay_minutes
        - batch_size
        - from_address
        - from_name
      frequent-templates:
        - welcome
        - password_reset
        - verification
        - notification

jasypt:
  encryptor:
    algorithm: PBEWITHHMACSHA512ANDAES_256
    key-obtention-iterations: 10000
    pool-size: 1